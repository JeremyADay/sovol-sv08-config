[multi_pin print_cooling_fan_pins]
pins: extra_mcu:PA7, extra_mcu:PB1

# print/part cooling fan
[fan]
pin: multi_pin:print_cooling_fan_pins
max_power: 1.0

[fan_generic exhaust_fan] # exhaust fan
pin: PA2
max_power: 1.0

# MCU fan, aka noisy boi, is now only enabled when using steppers, extruder, heatbed; 5min timeout
[controller_fan MCU_fan]
pin: PA1
max_power: 1
kick_start_time: 0.5
fan_speed: 1
idle_timeout: 300
heater: extruder, heater_bed
stepper: stepper_x, stepper_y

# Want your fan (host) temperature controlled? Uncomment the next section and comment out the above section, derived from: https://www.reddit.com/r/Sovol/comments/1cqntzu/first_mod_on_my_sv08_noctua_fan_for_the/
# WARNING: Do you have a Noctua 24V 4010 fan (eg. NF-A4x10 24V PWM)? Then this will not work and results in a non-spinning fan.
# In that case you can either use the above 'controller_fan' section or use 'control: watermark' and leave the pid entries commented out.
#[temperature_fan MCU_fan]
#pin: PA1
#kick_start_time: 0.5
#max_power: 1.0
#min_temp: 0
#max_temp: 90
#hardware_pwm: true
#target_temp: 50
#sensor_type: temperature_host # please comment out or remove the [temperature_sensor Host_temp] section if you don't want the temperature shown twice in the interface.
#max_speed: 1.0
#min_speed: 0.1
#control: pid
#pid_Kp: 2.0     ;40
#pid_Ki: 5.0     ;0.2
#pid_Kd: 0.5     ;0.1
#pid_deriv_time: 2.0
#control: watermark # use this control if pid control does not work for your fan

[heater_fan hotend_fan]      
pin: extra_mcu:PA6   
max_power: 1.0               
kick_start_time: 0.5         
heater: extruder             
heater_temp: 50              
tachometer_pin:extra_mcu:PA1
tachometer_ppr: 1
tachometer_poll_interval: 0.0013

[gcode_arcs]                       
resolution: 1.0                    

# Defined as an LED for ease of control
[led main_led]
white_pin:PA3
cycle_time: 0.010
hardware_pwm: False
initial_WHITE: 1.0

[idle_timeout]
gcode: _IDLE_TIMEOUT
timeout: 600

[temperature_sensor mcu_temp]         
sensor_type: temperature_mcu
min_temp:0
max_temp:100

[temperature_sensor Host_temp]     
sensor_type: temperature_host
min_temp: 0
max_temp: 110

[temperature_sensor Toolhead_Temp]
sensor_type: temperature_mcu
sensor_mcu: extra_mcu

[pause_resume]

[exclude_object]

#[adxl345]
#cs_pin:extra_mcu:PB12

#[resonance_tester]
#accel_chip: adxl345
#probe_points:
#    175, 175, 30  # an example175 Y175 Z30
#accel_per_hz:50
#min_freq:1
#max_freq:100
#max_smoothing:0.2
#hz_per_sec:0.5

[input_shaper]
shaper_type_x: mzv
shaper_freq_x: 52
shaper_type_y: mzv
shaper_freq_y: 40.2
damping_ratio_x: 0.1
damping_ratio_y: 0.1


#############################     EDDY-ng CONFIGURATION     ######################################

[mcu eddy]
serial: /dev/serial/by-id/usb-Klipper_rp2040_5044506130CDD01C-if00
restart_method: command

[probe_eddy_ng btt_eddy]
sensor_type: btt_eddy
i2c_mcu: eddy
i2c_bus: i2c0f
x_offset: -16
y_offset: 11.5
tap_drive_current: 15          # matches your stored calibration_15
tap_threshold: 0.01            # same sensitivity you’ve been typing by hand
tap_samples: 3                 # good, stable multi-sample default

[safe_z_home]
home_xy_position: 175,175   # center of the 350x350 bed
z_hop: 10
z_hop_speed: 15
speed: 200


[temperature_sensor btt_eddy_mcu]
sensor_type: temperature_mcu
sensor_mcu: eddy
min_temp: 10
max_temp: 100

[temperature_sensor btt_eddy]
sensor_type: Generic 3950
sensor_pin: eddy:gpio26


[bed_mesh]
speed: 500
horizontal_move_z: 2.0
mesh_min: 15,15
mesh_max: 335,335
probe_count: 9,9          # 15,15 seemed a bit much so back to 9,9 . 
mesh_pps: 3,3
algorithm: bicubic
bicubic_tension: 0.4
split_delta_z: 0.016
adaptive_margin: 5
fade_start: 0
fade_end: 10
fade_target: 0
# scan_overshoot: 8          # optional, if you have a few mm clearance on X.  Was turned  on- threw an error

 # --- end Eddy-NG ---  

[delayed_gcode bed_mesh_init]
initial_duration: 0.5
gcode:
    # Optional: preheat a little so compensation matches temps better
    # SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=60
    BED_MESH_PROFILE LOAD=default



[save_variables]
filename = ~/printer_data/config/saved_variables.cfg

