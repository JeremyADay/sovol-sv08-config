[include mainsail.cfg]
[include sovol-macros.cfg]
[include custom-macros.cfg]

# --- LCD Configuration ---
# Loads all .cfg files in the options/lcd folder
[include options/lcd/*.cfg]

# --- Probe & Homing Configuration ---
# Loads the Eddy Configuration and Homing Overrides
[include options/probe/eddy.cfg]



[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f103xe_32FFDA054747363027881857-if00
restart_method: command

[mcu extra_mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f103xe_55FF6F067186485355260487-if00
restart_method: command


      

[virtual_sdcard]
path: ~/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[printer]
kinematics: corexy           
max_velocity: 700            
max_accel: 40000             
#max_accel_to_decel: 10000 # deprecated
minimum_cruise_ratio: 0.5
max_z_velocity: 20           
max_z_accel: 500             
square_corner_velocity: 20.0 

[stepper_x]
step_pin: PE2
dir_pin: !PE0
enable_pin: !PE3
rotation_distance: 40         
microsteps: 16                
full_steps_per_rotation:200   
endstop_pin: tmc2209_stepper_x: virtual_endstop              
position_min: 0               
position_endstop: 355          
position_max: 355             
homing_speed: 30              
homing_retract_dist: 0        
homing_positive_dir: True

#--------------------------------------------------------------------
[tmc2209 stepper_x]
uart_pin: PE1
interpolate: True             
run_current: 1.1              
#hold_current: 1.2             
sense_resistor: 0.150         
stealthchop_threshold: 0      
uart_address:3
driver_sgthrs: 70
diag_pin: PE15

[stepper_y]
step_pin: PB8
dir_pin: !PB6
enable_pin: !PB9
rotation_distance: 40         
microsteps: 16                
full_steps_per_rotation:200   
endstop_pin: tmc2209_stepper_y: virtual_endstop              
position_min: 0               
position_endstop: 364         
position_max: 364            
homing_speed: 30              
homing_retract_dist: 0        
homing_positive_dir: true

#--------------------------------------------------------------------
[tmc2209 stepper_y]
uart_pin: PB7
interpolate: True             
run_current: 1.1              
#hold_current: 1.2             
sense_resistor: 0.150         
stealthchop_threshold: 0      
uart_address:3
driver_sgthrs: 70
diag_pin: PE13

[stepper_z] #motherboard：Z3 
step_pin:PC0    
dir_pin:PE5    
enable_pin:!PC1    
rotation_distance: 40         
gear_ratio: 80:12             
microsteps: 16                
endstop_pin: probe:z_virtual_endstop           
position_max: 347             
position_min: -5              
#position_endstop: 0
homing_speed: 15.0
homing_retract_dist: 5.0
homing_retract_speed: 15.0
second_homing_speed: 10.0

[tmc2209 stepper_z]
uart_pin: PE6 
interpolate: true             
run_current: 0.55           
#hold_current: 0.58         
sense_resistor: 0.150         
stealthchop_threshold: 999999 
uart_address:3

[stepper_z1] ##motherboard：Z1
step_pin:PD3  
dir_pin:!PD1 
enable_pin:!PD4 
rotation_distance: 40         
gear_ratio: 80:12            
microsteps: 16               

[tmc2209 stepper_z1]
uart_pin:PD2  
interpolate: true             
run_current:  0.55          
#hold_current: 0.58           
sense_resistor: 0.150         
stealthchop_threshold: 999999 
uart_address:3

[stepper_z2] ##motherboard：Z2
step_pin:PD7
dir_pin:PD5   
enable_pin:!PB5
rotation_distance: 40         
gear_ratio: 80:12             
microsteps: 16                

[tmc2209 stepper_z2]
uart_pin:PD6  
interpolate: true             
run_current: 0.55            
#hold_current: 0.58           
sense_resistor: 0.150         
stealthchop_threshold: 999999 
uart_address:3

[stepper_z3] ##motherboard：Z4
step_pin:PD11 
dir_pin:!PD9 
enable_pin:!PD12   
rotation_distance: 40         
gear_ratio: 80:12             
microsteps: 16                

[tmc2209 stepper_z3]
uart_pin:PD10    
interpolate: true            
run_current: 0.55         
#hold_current: 0.58           
sense_resistor: 0.150         
uart_address:3
stealthchop_threshold: 999999 

[thermistor my_thermistor_e]
temperature1:25
resistance1:110000
temperature2:100
resistance2:7008
temperature3:220
resistance3:435

[extruder]
step_pin: extra_mcu:PA8   
dir_pin: extra_mcu:PB8    
enable_pin:!extra_mcu: PB11   
rotation_distance: 6.05 
microsteps: 16                
full_steps_per_rotation: 200 
nozzle_diameter: 0.400        
filament_diameter: 1.75  
max_extrude_only_distance: 150     
heater_pin:extra_mcu:PB9  
sensor_type:my_thermistor_e  
pullup_resistor: 11500
sensor_pin: extra_mcu:PA5  
min_temp: 5                  
max_temp: 305                 
max_power: 1.0                
min_extrude_temp: 5
#control : pid
#pid_kp : 27.941
#pid_ki : 4.543
#pid_kd : 42.959
pressure_advance: 0.020    
pressure_advance_smooth_time: 0.035    

[tmc2209 extruder]
uart_pin: extra_mcu:PB10  
interpolate: True             
run_current: 0.8           
#hold_current: 0.75             
uart_address:3
sense_resistor: 0.150          

[verify_heater extruder]      
max_error: 120                
check_gain_time:30           
hysteresis: 5                
heating_gain: 2               

[filament_switch_sensor filament_sensor]
pause_on_runout: True
event_delay: 3.0
pause_delay: 0.5
switch_pin: PE9

[thermistor my_thermistor]
temperature1:25
resistance1:100000
temperature2:50
resistance2:18085.4
temperature3:100
resistance3:5362.6

[heater_bed]
heater_pin:PA0
sensor_type: my_thermistor  
sensor_pin: PC5
max_power: 1.0               
min_temp: 5                  
max_temp: 105                
#control : pid
#pid_kp : 70.954
#pid_ki : 1.058
#pid_kd : 1189.374

[verify_heater heater_bed]      
max_error: 120                
check_gain_time:40           
hysteresis: 5                
heating_gain: 2 



[quad_gantry_level]          
gantry_corners:              
	-60,-10
	410,420
points:
	36,10
	36,320
	346,320
	346,10
speed: 400                   
# horizontal_move_z: 10       # Gave an error so commented out
# min_horizontal_move_z: 2.0  # Gave an error so commented out
# adaptive_horizontal_move_z: # Gave an error so commented out
# retry_tolerance: 0.05       # Gave an error so commented out   
# retries: 5                  # Gave an error so commented out
# max_adjust: 30              # Gave an error so commented out


#Macro added from Eddy-ng

# [gcode_macro QUAD_GANTRY_LEVEL]
# rename_existing: _QUAD_GANTRY_LEVEL
# gcode:
#    SAVE_GCODE_STATE NAME=STATE_QGL
#    BED_MESH_CLEAR
#    # If QGL has not been done yet, correct for any major skew first
#    # at 8mm height
#    {% if not printer.quad_gantry_level.applied %}
#    _QUAD_GANTRY_LEVEL horizontal_move_z=8 retry_tolerance=1      
#    {% endif %}
#    # Complete with a full QGL at the configured height
#    _QUAD_GANTRY_LEVEL
#    RESTORE_GCODE_STATE NAME=STATE_QGL
    

[multi_pin print_cooling_fan_pins]
pins: extra_mcu:PA7, extra_mcu:PB1

# print/part cooling fan
[fan]
pin: multi_pin:print_cooling_fan_pins
max_power: 1.0

[fan_generic exhaust_fan] # exhaust fan
pin: PA2
max_power: 1.0

# MCU cooling fan control (stock 2-wire fan on PA1)
# Runs only when steppers/heaters are active, shuts off 5min after idle
[controller_fan MCU_fan]
pin: PA1
max_power: 1
kick_start_time: 0.5
fan_speed: 1
idle_timeout: 300      # 5-minute cool-down after the 10-min safety macro
heater: extruder, heater_bed
stepper: stepper_x, stepper_y

# --- Optional: temperature-based control (for future PWM/4-wire fan upgrade) ---
# Uncomment this block and comment out the controller_fan above if you replace
# the stock fan with a PWM-capable one. For the current 2-wire fan, use the block above.
;[temperature_fan MCU_fan]
;pin: PA1
;sensor_type: temperature_mcu
;control: watermark        # on near target, off below
;target_temp: 55           # fan kicks on when MCU >55 °C
;min_temp: 0
;max_temp: 90
;hardware_pwm: false       # use false for 2-wire fans
;kick_start_time: 0.5
;min_speed: 1.0
;max_power: 1.0

[heater_fan hotend_fan]      
pin: extra_mcu:PA6   
max_power: 1.0               
kick_start_time: 0.5         
heater: extruder             
heater_temp: 50              
tachometer_pin:extra_mcu:PA1
tachometer_ppr: 1
tachometer_poll_interval: 0.0013

[gcode_arcs]                       
resolution: 1.0                    

# Defined as an LED for ease of control
[led main_led]
white_pin:PA3
cycle_time: 0.010
hardware_pwm: False
initial_WHITE: 1.0

[idle_timeout]
gcode: _IDLE_TIMEOUT
timeout: 600

[temperature_sensor mcu_temp]         
sensor_type: temperature_mcu
min_temp:0
max_temp:100

[temperature_sensor Host_temp]     
sensor_type: temperature_host
min_temp: 0
max_temp: 110

[temperature_sensor Toolhead_Temp]
sensor_type: temperature_mcu
sensor_mcu: extra_mcu

[pause_resume]

[exclude_object]

[adxl345] # Uncommented after adding Katapault to the Hotend and Mainboard MCUs and updating Klipper
cs_pin:extra_mcu:PB12

[resonance_tester]  # Enables input shaper calibration with the ADXL345
accel_chip: adxl345
# Bed center with safe Z height for calibration moves
probe_points:
    175,175,20

# ---- Optional tuning parameters ----
#accel_per_hz: 50    # Leave commented; default sweep accel (75 mm/s²) is fine
#min_freq: 1         # Leave commented; default sweep starts at 5 Hz safely
#max_freq: 100       # Leave commented; default sweep goes higher (up to ~133 Hz)
#max_smoothing: 0.2  # Leave commented; default already filters noise well
#hz_per_sec: 0.5     # Leave commented; default 1 Hz/sec is faster but accurate

[input_shaper]
#shaper_type_x: mzv
#shaper_freq_x: 52
#shaper_type_y: mzv
#shaper_freq_y: 40.2
#damping_ratio_x: 0.1
#damping_ratio_y: 0.1



[save_variables]
filename = ~/printer_data/config/saved_variables.cfg

