[gcode_macro PRINT_START]
gcode:
    # This part fetches data from your Slicer. 
    # It checks for both "BED" and "BED_TEMP" to ensure it works with any slicer config.
    {% set target_bed = params.BED|default(params.BED_TEMP)|int %}
    {% set target_extruder = params.EXTRUDER|default(params.EXTRUDER_TEMP)|int %}
    {% set x_wait = printer.toolhead.axis_maximum.x|float / 2 %}
    {% set y_wait = printer.toolhead.axis_maximum.y|float / 2 %}

    # 1. Start heating bed and nozzle (partial)
    M140 S{target_bed} ; Set bed target
    M104 S150 ; Set nozzle to 150 to soften plastic but not ooze
    
    # 2. Home 
    G28                   ; Home all axes
    M190 S{target_bed}    ; Wait for bed heat

    # 3. Clean Nozzle (Crucial for accurate Z-homing)
    CLEAN_NOZZLE          ; Uses the macro in sovol-macros.cfg
    
    # 4. Leveling
    QUAD_GANTRY_LEVEL     ; Level the 4 Z motors
    G28 Z                 ; Re-home Z after leveling (Crucial for Eddy)

    # 5. Mesh (Adaptive - only meshes the print area)
    BED_MESH_CALIBRATE ADAPTIVE=1

    # 6. Final Heat
    G1 X{x_wait} Y{y_wait} Z15 F9000 ; Move to center
    M109 S{target_extruder}          ; Wait for nozzle heat

    # 7. Prime Line
    LINE_PURGE

[gcode_macro PRINT_END]
gcode:
    # Turn off heaters and fan
    TURN_OFF_HEATERS
    M107

    # Move nozzle away from print while retracting
    G91
    G1 X-2 Y-2 E-3 F300 ; Retract filament and move slightly
    G1 Z10 F3000        ; Raise nozzle 10mm

    # Park at the back
    G90
    G1 X175 Y350 F3000  ; Move to back center

    # Disable Steppers (optional, keeps Z from dropping if heavy)
    # M84

[gcode_macro LINE_PURGE]
gcode:
    M83                       ; Relative extrusion mode
    G90                       ; Absolute positioning
    G1 X5 Y5 Z0.4 F3000       ; Move to start position (Safe 0.4mm height)

    # 1. The "Dab"
    M117 Purging Blob...
    G1 E20 F150               ; Extrude fat blob
    G1 Z3.0 F3000             ; Lift Z up to 3mm to break filament
    G1 X20 F3000              ; Move right to X20 (Clearance from blob)
    G1 Z0.4 F3000             ; Drop back down to 0.4mm

    # 2. The Long Lines (Starts at X20, goes to X300)
    # Increased extrusion to E60 to match the "thick rope" look of your old code
    G1 X300 E60 F1200         ; Draw line out (Thick)
    G1 Y5.8 F5000             ; Shift Y
    G1 X25 E60 F1200          ; Draw line back (Stops at X25 to avoid hitting blob)
    
    # 3. Retract & Lift
    G1 E-1.0 F3000            ; Retract slightly
    G1 Z5.0 F3000             ; Lift Z

[gcode_macro PID_EXTRUDER]
gcode:
    M117 PID Tuning Extruder...
    PID_CALIBRATE HEATER=extruder TARGET=210
    SAVE_CONFIG

[gcode_macro PID_BED]
gcode:
    M117 PID Tuning Bed...
    PID_CALIBRATE HEATER=heater_bed TARGET=60
    SAVE_CONFIG

[gcode_macro PARK_REAR]
gcode:
    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}
    G90
    G1 X175 Y350 F6000

[gcode_macro FORCE_Z_UP]
gcode:
    # Force the printer to think it is at Z=0 so it allows movement
    SET_KINEMATIC_POSITION Z=0
    G91             ; Relative positioning
    G1 Z50 F1200    ; Move up 50mm
    G90             ; Return to absolute
    M84             ; Disable motors so you can move it manually if needed

[gcode_shell_command backup_cfg]
command: sh /home/biqu/printer_data/config/autocommit.sh
timeout: 30.0
verbose: True

[gcode_macro BACKUP_TO_GITHUB]
gcode:
    RUN_SHELL_COMMAND CMD=backup_cfg

    